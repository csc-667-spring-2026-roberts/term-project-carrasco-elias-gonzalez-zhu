name: CI

on:
  pull_request:
    branches:
      - m8

jobs:
  base-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
